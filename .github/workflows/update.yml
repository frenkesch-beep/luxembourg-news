name: Update news and deploy

on:
  schedule:
    - cron: "17 * * * *" # hourly (offset to avoid top-of-hour congestion)
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch news
        run: npm run fetch
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      - name: Commit updated data
        run: |
          git config user.name "letz-world-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/items.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Data update $(date -u +'%Y-%m-%dT%H:%MZ')"
            git pull --rebase origin main
            git push origin main
          fi

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # pick up the data commit pushed by the fetch job
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
